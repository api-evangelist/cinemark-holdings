description: >-
  Cinemark Holdings is one of the largest motion picture exhibitors in the
  world, operating theatres across the United States and Latin America under
  the Cinemark, Century, Tinseltown, Rave, and CineArts brands. Cinemark does
  not currently publish a general-purpose public developer portal; ticketing,
  showtime, and loyalty integrations are typically delivered through partner
  agreements and third-party aggregators (Movio, Atom Tickets, Fandango).
